<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard — AI Engineer Academy</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <h1 id="greeting">Welcome back</h1>
      <p class="muted" id="subGreeting">Here's where you stand on the path.</p>

      <div class="grid grid-3" style="margin:22px 0;">
        <div class="card">
          <div class="stat-value" id="statProgress">—%</div>
          <div class="stat-label">Curriculum complete</div>
        </div>
        <div class="card">
          <div class="stat-value" id="statStreak">—</div>
          <div class="stat-label">Day streak</div>
        </div>
        <div class="card">
          <div class="stat-value" id="statHours">—</div>
          <div class="stat-label">Hours studied total</div>
        </div>
      </div>

      <div class="grid" style="grid-template-columns: 1.3fr 1fr; align-items:start;">
        <div class="card">
          <h2>Your journey</h2>
          <p class="muted" style="margin-bottom:16px;">6 months, 6 phases, 26 weeks. The lit marker is where you are now.</p>
          <div class="trail" id="trail"></div>
        </div>

        <div class="card">
          <h2>This week</h2>
          <div id="thisWeekBox"></div>
          <a href="/syllabus.html" class="btn-primary" style="display:inline-block; margin-top:14px; text-align:center;">Go to syllabus →</a>
        </div>
      </div>

      <div class="card" style="margin-top:16px;">
        <h2>Quiz performance</h2>
        <p class="muted" id="quizSummary">No quizzes taken yet.</p>
      </div>
    </main>
  </div>

<script src="/js/app.js"></script>
<script>
  requireAuth();
  renderSidebar("/dashboard.html");

  const PHASE_LABELS = {};

  async function load() {
    const user = getUser();
    document.getElementById("greeting").textContent = `Welcome back, ${user?.name || ""}`;

    const [curriculumData, stats, timerStats] = await Promise.all([
      api("/curriculum"),
      api("/stats"),
      api("/timer/stats"),
    ]);

    document.getElementById("statProgress").textContent = stats.percentComplete + "%";
    document.getElementById("statStreak").textContent = timerStats.streak + (timerStats.streak === 1 ? " day" : " days");
    document.getElementById("statHours").textContent = timerStats.totalHours + "h";

    // Journey trail: one node per phase
    const trailEl = document.getElementById("trail");
    trailEl.innerHTML = curriculumData.phases
      .map((phase) => {
        const isDone = stats.currentWeek > phase.weeks[1];
        const isCurrent = stats.currentWeek >= phase.weeks[0] && stats.currentWeek <= phase.weeks[1];
        return `
          <div class="trail-node ${isDone ? "done" : ""} ${isCurrent ? "current" : ""}">
            <div class="phase-title">${phase.title}</div>
            <div class="phase-weeks">Weeks ${phase.weeks[0]}–${phase.weeks[1]}${isCurrent ? " · you are here" : ""}</div>
          </div>`;
      })
      .join("");

    // This week box
    const week = curriculumData.weeks.find((w) => w.week === stats.currentWeek);
    const progressData = await api("/progress");
    const doneSet = new Set(progressData.progress.filter((p) => p.completed).map((p) => p.item_id));
    const weekDone = week.checklist.filter((i) => doneSet.has(i.id)).length;
    document.getElementById("thisWeekBox").innerHTML = `
      <div class="pill ember">WEEK ${week.week}</div>
      <h3 style="margin-top:10px;">${week.title}</h3>
      <p class="muted">${week.goal}</p>
      <div class="progress-bar" style="margin:10px 0 6px;">
        <div class="progress-bar-fill" style="width:${Math.round((weekDone / week.checklist.length) * 100)}%"></div>
      </div>
      <div class="muted mono">${weekDone}/${week.checklist.length} tasks done</div>
    `;

    // Quiz summary
    const history = await api("/quiz-history");
    if (history.history.length) {
      const avg = Math.round(
        (history.history.reduce((s, h) => s + h.score / h.total, 0) / history.history.length) * 100
      );
      document.getElementById("quizSummary").innerHTML =
        `Average score: <span class="mono" style="color:var(--signal);">${avg}%</span> across ${history.history.length} quiz${history.history.length === 1 ? "" : "zes"} taken.`;
    }
  }

  load().catch((e) => console.error(e));
</script>
</body>
</html>
